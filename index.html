<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0078d4">
  <meta name="description" content="Asertiva Digital - Dynamics 365 CRM">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Asertiva CRM">
  <title>Asertiva CRM</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ms-blue: #0078d4;
      --ms-dark: #003e75;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0078d4 0%, #005a9e 50%, #003e75 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .card {
      background: #fff;
      border-radius: 4px;
      padding: 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      position: relative;
      z-index: 1;
      animation: up 0.45s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes up {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-box {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, #0078d4, #005a9e);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-box svg { width: 26px; height: 26px; fill: white; }

    .logo-text h1 { font-size: 17px; font-weight: 600; color: #323130; }
    .logo-text p  { font-size: 12px; color: #605e5c; }

    h2 { font-size: 22px; font-weight: 600; color: #323130; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #605e5c; margin-bottom: 28px; }
    .sub strong { color: #323130; }

    label { display: block; font-size: 14px; font-weight: 600; color: #323130; margin-bottom: 5px; }

    .field { margin-bottom: 16px; }

    .input-wrap { position: relative; }

    input[type=text], input[type=email] {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      color: #323130;
      border: 1px solid #8a8886;
      border-radius: 2px;
      outline: none;
      transition: border 0.15s;
    }
    input:focus { border: 2px solid #0078d4; padding: 7px 11px; }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0 24px;
    }
    .remember-row input[type=checkbox] {
      width: 16px; height: 16px;
      accent-color: #0078d4;
      cursor: pointer;
    }
    .remember-row label {
      font-size: 13px;
      font-weight: 400;
      color: #605e5c;
      cursor: pointer;
      margin: 0;
    }

    .btn {
      width: 100%;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: #0078d4;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { background: #005a9e; }
    .btn:active { background: #003e75; }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loading .spinner { display: block; }
    .loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid #edebe9;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ms-logo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1.5px;
      width: 18px; height: 18px;
    }
    .ms-logo span { display: block; }
    .ms-logo span:nth-child(1) { background: #f25022; }
    .ms-logo span:nth-child(2) { background: #7fba00; }
    .ms-logo span:nth-child(3) { background: #00a4ef; }
    .ms-logo span:nth-child(4) { background: #ffb900; }

    .footer-left { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #a19f9d; }
    .version { font-size: 11px; color: #c8c6c4; }

    /* Install banner */
    .install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0078d4;
      color: white;
      padding: 12px 18px;
      border-radius: 4px;
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 999;
      align-items: center;
      gap: 12px;
      max-width: 380px;
      width: calc(100% - 40px);
      animation: up2 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .install-banner.show { display: flex; }
    @keyframes up2 {
      from { opacity:0; transform:translateX(-50%) translateY(16px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    .install-banner-text { flex: 1; }
    .install-banner-text strong { display: block; margin-bottom: 2px; }
    .install-banner-text span { font-size: 11px; opacity: 0.8; }
    .install-btn {
      background: white; color: #0078d4;
      border: none; padding: 6px 14px;
      border-radius: 2px; font-size: 12px;
      font-weight: 600; font-family: inherit; cursor: pointer;
      white-space: nowrap;
    }
    .close-banner {
      background: none; border: none; color: rgba(255,255,255,0.7);
      cursor: pointer; font-size: 16px; line-height: 1;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-row">
      <div class="logo-box">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 14H5c-.55 0-1-.45-1-1V7c0-.55.45-1 1-1h14c.55 0 1 .45 1 1v10c0 .55-.45 1-1 1zm-7-9.5L7.5 13H11v4h2v-4h3.5L12 8.5z"/></svg>
      </div>
      <div class="logo-text">
        <h1>Asertiva Digital</h1>
        <p>Dynamics 365 CRM</p>
      </div>
    </div>

    <h2>Bienvenido</h2>
    <p class="sub">Ingresa tu cuenta <strong>@asertiva.co</strong> para continuar</p>

    <div class="field">
      <label for="email">Correo corporativo</label>
      <input type="email" id="email" placeholder="usuario@asertiva.co" autocomplete="email" spellcheck="false" autocapitalize="none">
    </div>

    <div class="remember-row">
      <input type="checkbox" id="remember" checked>
      <label for="remember">Recordar mi usuario en este equipo</label>
    </div>

    <button class="btn" id="btn" onclick="goToCRM()">
      <div class="spinner"></div>
      <span class="btn-label">Continuar con Microsoft</span>
    </button>

    <div class="footer">
      <div class="footer-left">
        <div class="ms-logo"><span></span><span></span><span></span><span></span></div>
        Microsoft 365
      </div>
      <span class="version">v2.0</span>
    </div>
  </div>

  <!-- Install banner -->
  <div class="install-banner" id="install-banner">
    <div class="install-banner-text">
      <strong>Instalar Asertiva CRM</strong>
      <span>Accede como app desde tu escritorio</span>
    </div>
    <button class="install-btn" onclick="installApp()">Instalar</button>
    <button class="close-banner" onclick="hideBanner()">✕</button>
  </div>

  <script>
    const CRM_URL = 'https://org45d1ff14.crm2.dynamics.com/main.aspx?appid=e1429753-4410-f111-8342-6045bd3b9ec0&forceUCI=1&pagetype=entitylist&etn=account&viewid=fb4b3393-d711-f111-8342-7ced8da8d52d&viewType=4230';
    const STORAGE_KEY = 'asertiva_crm_user';

    // --- Cargar usuario guardado ---
    window.addEventListener('load', () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        document.getElementById('email').value = saved;
      }

      // Registrar service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    });

    // --- PWA Install ---
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').classList.add('show');
    });
    window.addEventListener('appinstalled', hideBanner);

    function hideBanner() {
      document.getElementById('install-banner').classList.remove('show');
    }

    async function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        hideBanner();
      }
    }

    // --- Ir al CRM ---
    function goToCRM() {
      const email = document.getElementById('email').value.trim();
      const remember = document.getElementById('remember').checked;
      const btn = document.getElementById('btn');

      if (!email) {
        document.getElementById('email').focus();
        document.getElementById('email').style.border = '2px solid #c72a1c';
        return;
      }

      // Guardar o borrar usuario según checkbox
      if (remember) {
        localStorage.setItem(STORAGE_KEY, email);
      } else {
        localStorage.removeItem(STORAGE_KEY);
      }

      // Mostrar loading
      btn.classList.add('loading');
      btn.disabled = true;

      // Construir URL de login de Microsoft con hint del usuario
      // Esto lleva directo a la pantalla de contraseña de Microsoft
      const msLoginUrl =
        'https://login.microsoftonline.com/common/oauth2/authorize' +
        '?response_type=code' +
        '&client_id=51f81489-12ee-4a9e-aaae-a2591f45987d' +
        '&resource=https%3A%2F%2Forg45d1ff14.crm2.dynamics.com' +
        '&redirect_uri=' + encodeURIComponent(CRM_URL) +
        '&login_hint=' + encodeURIComponent(email) +
        '&prompt=select_account';

      // Redirigir directo
      setTimeout(() => {
        window.location.href = CRM_URL;
      }, 600);
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') goToCRM();
    });

    // Reset border on input
    document.getElementById('email').addEventListener('input', function() {
      this.style.border = '';
    });
  </script>
</body>
</html>
